<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vipin To do List Board</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    
    .kanban-column { min-height: 200px; }
    
    .task-card {
      cursor: grab;
      transition: all 0.2s ease;
    }
    
    .task-card:hover {
      transform: translateY(-2px);
    }
    
    .task-card:active {
      cursor: grabbing;
    }
    
    .task-card.sortable-ghost {
      opacity: 0.4;
      background: #e2e8f0 !important;
    }
    
    .task-card.sortable-chosen {
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      transform: rotate(3deg) scale(1.02);
    }
    
    .task-card.sortable-drag {
      opacity: 1;
    }
    
    .column-drop-highlight {
      background: rgba(99, 102, 241, 0.1) !important;
      border: 2px dashed #6366f1 !important;
    }
    
    .add-task-input {
      transition: all 0.3s ease;
    }
    
    .delete-btn {
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    
    .task-card:hover .delete-btn {
      opacity: 1;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .task-card-new {
      animation: slideIn 0.3s ease;
    }
    
    .dark-mode {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%) !important;
    }
    
    .dark-mode .column-card {
      background: #1e293b !important;
      border-color: #334155 !important;
    }
    
    .dark-mode .task-card {
      background: #334155 !important;
      color: #f1f5f9 !important;
    }
    
    .dark-mode .column-title {
      color: #f1f5f9 !important;
    }
    
    .dark-mode .board-title {
      color: #f1f5f9 !important;
    }
    
    .dark-mode .add-btn {
      color: #94a3b8 !important;
    }
    
    .dark-mode .add-btn:hover {
      background: #475569 !important;
    }
    
    .edit-input {
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      padding: 0;
      font-size: inherit;
      color: inherit;
    }
    
    .edit-input:focus {
      background: rgba(255,255,255,0.5);
      border-radius: 4px;
      padding: 2px 4px;
      margin: -2px -4px;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gradient-to-br from-slate-100 via-purple-50 to-blue-50 overflow-auto">
  <div id="app-container" class="w-full min-h-full p-4 md:p-8"><!-- Header -->
   <header class="flex flex-col sm:flex-row items-center justify-between mb-8 gap-4">
    <div class="flex items-center gap-3">
     <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg">
      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"></path>
      </svg>
     </div>
     <h1 id="board-title" class="board-title text-2xl md:text-3xl font-bold text-slate-800">Simple Kanban Board</h1>
    </div><button id="dark-mode-toggle" class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-md hover:shadow-lg transition-all text-slate-600 hover:text-slate-800">
     <svg id="sun-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
     </svg>
     <svg id="moon-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
     </svg><span id="mode-text" class="text-sm font-medium">Dark Mode</span> </button>
   </header><!-- Kanban Board -->
   <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6"><!-- To Do Column -->
    <div class="column-card bg-white/80 backdrop-blur-sm rounded-2xl shadow-lg border border-white/50 overflow-hidden">
     <div class="p-4 bg-gradient-to-r from-purple-100 to-purple-50 border-b border-purple-100">
      <div class="flex items-center gap-2">
       <div class="w-3 h-3 rounded-full bg-purple-400"></div>
       <h2 id="todo-title" class="column-title font-semibold text-purple-800">To Do</h2><span id="todo-count" class="ml-auto bg-purple-200 text-purple-700 text-xs font-bold px-2 py-1 rounded-full">0</span>
      </div>
     </div>
     <div id="todo-tasks" class="kanban-column p-3 space-y-3" data-column="todo">
     </div>
     <div class="p-3 border-t border-slate-100">
      <div id="todo-add-form" class="hidden"><input type="text" id="todo-input" class="add-task-input w-full px-3 py-2 border border-purple-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 text-sm" placeholder="Enter task title...">
       <div class="flex gap-2 mt-2"><button onclick="addTask('todo')" class="flex-1 bg-purple-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-purple-600 transition-colors">Add</button> <button onclick="toggleAddForm('todo')" class="flex-1 bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-slate-200 transition-colors">Cancel</button>
       </div>
      </div><button id="todo-add-btn" onclick="toggleAddForm('todo')" class="add-btn w-full flex items-center justify-center gap-2 py-2 text-slate-500 hover:bg-purple-50 rounded-lg transition-colors text-sm">
       <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
       </svg> Add a task </button>
     </div>
    </div><!-- In Progress Column -->
    <div class="column-card bg-white/80 backdrop-blur-sm rounded-2xl shadow-lg border border-white/50 overflow-hidden">
     <div class="p-4 bg-gradient-to-r from-amber-100 to-amber-50 border-b border-amber-100">
      <div class="flex items-center gap-2">
       <div class="w-3 h-3 rounded-full bg-amber-400"></div>
       <h2 id="progress-title" class="column-title font-semibold text-amber-800">In Progress</h2><span id="progress-count" class="ml-auto bg-amber-200 text-amber-700 text-xs font-bold px-2 py-1 rounded-full">0</span>
      </div>
     </div>
     <div id="progress-tasks" class="kanban-column p-3 space-y-3" data-column="progress">
     </div>
     <div class="p-3 border-t border-slate-100">
      <div id="progress-add-form" class="hidden"><input type="text" id="progress-input" class="add-task-input w-full px-3 py-2 border border-amber-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 text-sm" placeholder="Enter task title...">
       <div class="flex gap-2 mt-2"><button onclick="addTask('progress')" class="flex-1 bg-amber-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-amber-600 transition-colors">Add</button> <button onclick="toggleAddForm('progress')" class="flex-1 bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-slate-200 transition-colors">Cancel</button>
       </div>
      </div><button id="progress-add-btn" onclick="toggleAddForm('progress')" class="add-btn w-full flex items-center justify-center gap-2 py-2 text-slate-500 hover:bg-amber-50 rounded-lg transition-colors text-sm">
       <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
       </svg> Add a task </button>
     </div>
    </div><!-- Done Column -->
    <div class="column-card bg-white/80 backdrop-blur-sm rounded-2xl shadow-lg border border-white/50 overflow-hidden">
     <div class="p-4 bg-gradient-to-r from-emerald-100 to-emerald-50 border-b border-emerald-100">
      <div class="flex items-center gap-2">
       <div class="w-3 h-3 rounded-full bg-emerald-400"></div>
       <h2 id="done-title" class="column-title font-semibold text-emerald-800">Done</h2><span id="done-count" class="ml-auto bg-emerald-200 text-emerald-700 text-xs font-bold px-2 py-1 rounded-full">0</span>
      </div>
     </div>
     <div id="done-tasks" class="kanban-column p-3 space-y-3" data-column="done">
     </div>
     <div class="p-3 border-t border-slate-100">
      <div id="done-add-form" class="hidden"><input type="text" id="done-input" class="add-task-input w-full px-3 py-2 border border-emerald-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-400 text-sm" placeholder="Enter task title...">
       <div class="flex gap-2 mt-2"><button onclick="addTask('done')" class="flex-1 bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-emerald-600 transition-colors">Add</button> <button onclick="toggleAddForm('done')" class="flex-1 bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-slate-200 transition-colors">Cancel</button>
       </div>
      </div><button id="done-add-btn" onclick="toggleAddForm('done')" class="add-btn w-full flex items-center justify-center gap-2 py-2 text-slate-500 hover:bg-emerald-50 rounded-lg transition-colors text-sm">
       <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
       </svg> Add a task </button>
     </div>
    </div>
   </div><!-- Toast Notification -->
   <div id="toast" class="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-xl shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-2">
    <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
    </svg><span id="toast-message">Task moved successfully</span>
   </div>
  </div>
  <script>
    // Default configuration
    const defaultConfig = {
      board_title: 'Simple Kanban Board',
      todo_title: 'To Do',
      progress_title: 'In Progress',
      done_title: 'Done',
      primary_color: '#6366f1',
      secondary_color: '#f8fafc',
      text_color: '#1e293b',
      accent_color: '#a855f7',
      surface_color: '#ffffff'
    };

    // Task data structure
    let tasks = {
      todo: [],
      progress: [],
      done: []
    };

    let isDarkMode = false;
    let sortableInstances = [];

    // Load tasks from localStorage
    function loadTasks() {
      const saved = localStorage.getItem('kanban-tasks');
      if (saved) {
        tasks = JSON.parse(saved);
      } else {
        // Default example tasks
        tasks = {
          todo: [
            { id: generateId(), title: 'Website Suggestion - MogPrint', createdAt: Date.now() },
            { id: generateId(), title: 'Website Suggestion - PWC Parts', createdAt: Date.now() }
          ],
          progress: [
            { id: generateId(), title: 'Keywords Research - PWC Parts', createdAt: Date.now() }
          ],
          done: [
            { id: generateId(), title: 'Campaign Creation | Thrill Motors | Google Ads', createdAt: Date.now() }
          ]
        };
        saveTasks();
      }
    }

    // Save tasks to localStorage
    function saveTasks() {
      localStorage.setItem('kanban-tasks', JSON.stringify(tasks));
    }

    // Generate unique ID
    function generateId() {
      return 'task-' + Math.random().toString(36).substr(2, 9);
    }

    // Create task card HTML
    function createTaskCard(task, isNew = false) {
      const card = document.createElement('div');
      card.className = `task-card bg-white p-3 rounded-xl shadow-sm border border-slate-100 group ${isNew ? 'task-card-new' : ''}`;
      card.setAttribute('data-id', task.id);
      
      card.innerHTML = `
        <div class="flex items-start justify-between gap-2">
          <span class="task-title text-sm text-slate-700 flex-1 cursor-text" ondblclick="startEditTask('${task.id}')">${escapeHtml(task.title)}</span>
          <button onclick="deleteTask('${task.id}')" class="delete-btn p-1 rounded-lg hover:bg-red-50 text-slate-400 hover:text-red-500 transition-colors flex-shrink-0" title="Delete task">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
            </svg>
          </button>
        </div>
        <div class="mt-2 flex items-center gap-2 text-xs text-slate-400">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <span>${formatDate(task.createdAt)}</span>
        </div>
      `;
      
      return card;
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Format date
    function formatDate(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // Render all tasks
    function renderTasks() {
      ['todo', 'progress', 'done'].forEach(column => {
        const container = document.getElementById(`${column}-tasks`);
        container.innerHTML = '';
        
        tasks[column].forEach(task => {
          container.appendChild(createTaskCard(task));
        });
      });
      
      updateCounts();
    }

    // Update task counts
    function updateCounts() {
      document.getElementById('todo-count').textContent = tasks.todo.length;
      document.getElementById('progress-count').textContent = tasks.progress.length;
      document.getElementById('done-count').textContent = tasks.done.length;
    }

    // Toggle add task form
    function toggleAddForm(column) {
      const form = document.getElementById(`${column}-add-form`);
      const btn = document.getElementById(`${column}-add-btn`);
      const input = document.getElementById(`${column}-input`);
      
      if (form.classList.contains('hidden')) {
        form.classList.remove('hidden');
        btn.classList.add('hidden');
        input.focus();
      } else {
        form.classList.add('hidden');
        btn.classList.remove('hidden');
        input.value = '';
      }
    }

    // Add new task
    function addTask(column) {
      const input = document.getElementById(`${column}-input`);
      const title = input.value.trim();
      
      if (!title) return;
      
      const newTask = {
        id: generateId(),
        title: title,
        createdAt: Date.now()
      };
      
      tasks[column].push(newTask);
      saveTasks();
      
      const container = document.getElementById(`${column}-tasks`);
      container.appendChild(createTaskCard(newTask, true));
      
      input.value = '';
      toggleAddForm(column);
      updateCounts();
      showToast('Task added successfully');
    }

    // Delete task
    function deleteTask(taskId) {
      for (const column of ['todo', 'progress', 'done']) {
        const index = tasks[column].findIndex(t => t.id === taskId);
        if (index !== -1) {
          tasks[column].splice(index, 1);
          break;
        }
      }
      
      saveTasks();
      
      const card = document.querySelector(`[data-id="${taskId}"]`);
      if (card) {
        card.style.transform = 'scale(0.8)';
        card.style.opacity = '0';
        setTimeout(() => card.remove(), 200);
      }
      
      setTimeout(updateCounts, 200);
      showToast('Task deleted');
    }

    // Start editing task
    function startEditTask(taskId) {
      const card = document.querySelector(`[data-id="${taskId}"]`);
      const titleSpan = card.querySelector('.task-title');
      const currentTitle = titleSpan.textContent;
      
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'edit-input text-sm text-slate-700';
      input.value = currentTitle;
      
      titleSpan.replaceWith(input);
      input.focus();
      input.select();
      
      const saveEdit = () => {
        const newTitle = input.value.trim();
        if (newTitle && newTitle !== currentTitle) {
          for (const column of ['todo', 'progress', 'done']) {
            const task = tasks[column].find(t => t.id === taskId);
            if (task) {
              task.title = newTitle;
              break;
            }
          }
          saveTasks();
          showToast('Task updated');
        }
        
        const newSpan = document.createElement('span');
        newSpan.className = 'task-title text-sm text-slate-700 flex-1 cursor-text';
        newSpan.textContent = newTitle || currentTitle;
        newSpan.setAttribute('ondblclick', `startEditTask('${taskId}')`);
        input.replaceWith(newSpan);
      };
      
      input.addEventListener('blur', saveEdit);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          input.blur();
        } else if (e.key === 'Escape') {
          input.value = currentTitle;
          input.blur();
        }
      });
    }

    // Show toast notification
    function showToast(message) {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toast-message');
      
      toastMessage.textContent = message;
      toast.classList.remove('translate-y-20', 'opacity-0');
      
      setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0');
      }, 2000);
    }

    // Toggle dark mode
    function toggleDarkMode() {
      isDarkMode = !isDarkMode;
      const body = document.body;
      const modeText = document.getElementById('mode-text');
      const sunIcon = document.getElementById('sun-icon');
      const moonIcon = document.getElementById('moon-icon');
      
      if (isDarkMode) {
        body.classList.add('dark-mode');
        modeText.textContent = 'Light Mode';
        sunIcon.classList.remove('hidden');
        moonIcon.classList.add('hidden');
      } else {
        body.classList.remove('dark-mode');
        modeText.textContent = 'Dark Mode';
        sunIcon.classList.add('hidden');
        moonIcon.classList.remove('hidden');
      }
      
      localStorage.setItem('kanban-dark-mode', isDarkMode);
    }

    // Initialize Sortable.js for drag and drop
    function initSortable() {
      sortableInstances.forEach(instance => instance.destroy());
      sortableInstances = [];
      
      ['todo', 'progress', 'done'].forEach(column => {
        const el = document.getElementById(`${column}-tasks`);
        const sortable = new Sortable(el, {
          group: 'kanban',
          animation: 200,
          easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
          ghostClass: 'sortable-ghost',
          chosenClass: 'sortable-chosen',
          dragClass: 'sortable-drag',
          handle: '.task-card',
          onEnd: function(evt) {
            const taskId = evt.item.getAttribute('data-id');
            const fromColumn = evt.from.getAttribute('data-column');
            const toColumn = evt.to.getAttribute('data-column');
            const newIndex = evt.newIndex;
            
            // Find and remove task from original column
            let task = null;
            for (const col of ['todo', 'progress', 'done']) {
              const index = tasks[col].findIndex(t => t.id === taskId);
              if (index !== -1) {
                task = tasks[col].splice(index, 1)[0];
                break;
              }
            }
            
            // Add to new position
            if (task) {
              tasks[toColumn].splice(newIndex, 0, task);
              saveTasks();
              updateCounts();
              
              if (fromColumn !== toColumn) {
                showToast(`Task moved to ${toColumn === 'todo' ? 'To Do' : toColumn === 'progress' ? 'In Progress' : 'Done'}`);
              }
            }
          }
        });
        sortableInstances.push(sortable);
      });
    }

    // Handle enter key for input fields
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        ['todo', 'progress', 'done'].forEach(column => {
          const input = document.getElementById(`${column}-input`);
          if (document.activeElement === input) {
            e.preventDefault();
            addTask(column);
          }
        });
      }
    });

    // Element SDK configuration
    async function onConfigChange(config) {
      document.getElementById('board-title').textContent = config.board_title || defaultConfig.board_title;
      document.getElementById('todo-title').textContent = config.todo_title || defaultConfig.todo_title;
      document.getElementById('progress-title').textContent = config.progress_title || defaultConfig.progress_title;
      document.getElementById('done-title').textContent = config.done_title || defaultConfig.done_title;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.secondary_color || defaultConfig.secondary_color,
            set: (value) => { config.secondary_color = value; window.elementSdk.setConfig({ secondary_color: value }); }
          },
          {
            get: () => config.surface_color || defaultConfig.surface_color,
            set: (value) => { config.surface_color = value; window.elementSdk.setConfig({ surface_color: value }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
          },
          {
            get: () => config.primary_color || defaultConfig.primary_color,
            set: (value) => { config.primary_color = value; window.elementSdk.setConfig({ primary_color: value }); }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (value) => { config.accent_color = value; window.elementSdk.setConfig({ accent_color: value }); }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues

    const savedDarkMode = localStorage.getItem('kanban-dark-mode');

      toggleDarkMode();
    }

    // Dark mode toggle listener
    document.getElementById('dark-mode-toggle').addEventListener('click', toggleDarkMode);
